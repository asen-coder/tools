name: daily-learning 每日内容生成

on:
  schedule:
    # 00:00 UTC = 08:00 CST（北京时间）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 生成今日内容
        run: python daily-learning/scripts/generate.py

      - name: 提交数据变更
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add daily-learning/data/words.json daily-learning/data/stats.json \
                  daily-learning/docs/today.json daily-learning/docs/all_words.json \
                  daily-learning/REFERENCE.md
          git diff --cached --quiet || git commit -m "daily: $(date -u +%Y-%m-%d)"
          git push

      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: daily-learning/docs
          branch: gh-pages
          clean: true
