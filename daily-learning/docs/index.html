<!DOCTYPE html>
<html lang="zh" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日学习</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">◆</span>
          每日学习
        </div>
        <nav class="tab-nav" role="tablist">
          <button
            class="tab-btn active"
            data-tab="today"
            role="tab"
            aria-selected="true"
          >
            今日
          </button>
          <button
            class="tab-btn"
            data-tab="words"
            role="tab"
            aria-selected="false"
          >
            词库
          </button>
          <button
            class="tab-btn"
            data-tab="progress"
            role="tab"
            aria-selected="false"
          >
            进度
          </button>
          <button
            class="tab-btn"
            data-tab="quiz"
            role="tab"
            aria-selected="false"
          >
            练习
          </button>
        </nav>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
          <svg
            class="icon-sun"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg
            class="icon-moon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>
    </header>

    <main class="main">
      <div id="tab-today" class="tab-panel active" role="tabpanel">
        <div id="today-content" class="container">
          <div class="skeleton-wrap">
            <div class="skeleton-line wide"></div>
            <div class="skeleton-line medium"></div>
            <div class="skeleton-grid">
              <div class="skeleton-card"></div>
              <div class="skeleton-card"></div>
              <div class="skeleton-card"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-words" class="tab-panel" role="tabpanel">
        <div id="words-content" class="container"></div>
      </div>

      <div id="tab-progress" class="tab-panel" role="tabpanel">
        <div id="progress-content" class="container"></div>
      </div>

      <div id="tab-quiz" class="tab-panel" role="tabpanel">
        <div id="quiz-content" class="container"></div>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
